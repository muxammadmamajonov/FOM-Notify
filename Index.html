<!DOCTYPE html>
<html lang="ru">
<head>
  <base target="_top">

  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#f5f5f3">
  <meta name="color-scheme" content="light dark">

  <title>🏆 ТОП-3 Продажи · ТВ</title>

  <style>
    :root{
      --bg:#282b30;
      --panel:#2f3238;
      --panel-2:#373a42;
      --border:#3d414a;
      --border-strong:#4a4e58;

      --text:#e8eaef;
      --text-dim:#c0c4cc;
      --muted:#8a8e98;

      --accent:#60a5fa;
      --accent-soft:#373a42;

      --p-ALL:#a78bfa;
      --p-AA:#f59e0b;
      --p-FA:#60a5fa;
      --p-FK:#34d399;
      --p-FS:#f472b6;

      --gold:#eab308;
      --silv:#94a3b8;
      --bron:#c26a3f;

      --ok:#34d399;
      --warn:#f59e0b;
      --err:#f87171;

      --shadow:0 12px 40px rgba(0,0,0,.16);
      --tg-safe-bottom:0px;
    }

    body.light{
      --bg:#f5f5f3;
      --panel:#ffffff;
      --panel-2:#ecebe7;
      --border:#e0dfda;
      --border-strong:#cbcac5;

      --text:#1f2228;
      --text-dim:#3d4249;
      --muted:#6c7079;

      --accent:#2563eb;
      --accent-soft:#e8ebf2;

      --p-ALL:#7c3aed;
      --p-AA:#d97706;
      --p-FA:#2563eb;
      --p-FK:#059669;
      --p-FS:#db2777;

      --gold:#dca300;
      --silv:#8a97a8;
      --bron:#b45a35;

      --ok:#059669;
      --warn:#d97706;
      --err:#dc2626;

      --shadow:0 10px 30px rgba(15,23,42,.07);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
    }

    button{
      font-family:inherit;
      -webkit-tap-highlight-color:transparent;
    }

    .app{
      width:100%;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .hdr{
      position:sticky;
      top:0;
      z-index:100;
      display:grid;
      grid-template-columns:minmax(260px,auto) 1fr;
      gap:16px;
      align-items:center;
      padding:16px 18px;
      border-bottom:1px solid var(--border);
      background:rgba(47,50,56,.9);
      backdrop-filter:blur(16px);
    }

    body.light .hdr{
      background:rgba(255,255,255,.9);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .logo{
      width:50px;
      height:50px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--gold),#facc15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:25px;
      flex-shrink:0;
      box-shadow:0 10px 30px rgba(234,179,8,.22);
    }

    .brand-text{
      min-width:0;
    }

    .ttl{
      font-size:25px;
      font-weight:850;
      line-height:1.05;
      letter-spacing:-.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subttl{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hdr-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      min-width:0;
      flex-wrap:wrap;
    }

    .segmented{
      display:flex;
      align-items:center;
      gap:4px;
      background:var(--panel-2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:4px;
      min-width:0;
    }

    .segmented-label{
      padding:0 9px;
      font-size:10px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      white-space:nowrap;
    }

    .segmented-btn{
      border:0;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      border-radius:10px;
      padding:10px 13px;
      font-size:13px;
      font-weight:800;
      transition:.16s ease;
      white-space:nowrap;
    }

    .segmented-btn:hover{
      color:var(--text);
    }

    .segmented-btn.active{
      background:var(--accent);
      color:#fff;
      box-shadow:0 5px 15px rgba(0,0,0,.12);
    }

    .period-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:1px solid var(--border);
      background:var(--panel-2);
      color:var(--text);
      border-radius:14px;
      padding:10px 14px;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      min-height:42px;
      transition:.16s ease;
      white-space:nowrap;
    }

    .period-btn:hover{
      border-color:var(--accent);
    }

    .period-btn.active{
      border-color:var(--accent);
      color:var(--accent);
    }

    .period-icon{
      width:17px;
      height:17px;
      stroke-width:2;
      flex-shrink:0;
    }

    .status{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:1px solid var(--border);
      background:var(--panel-2);
      border-radius:14px;
      padding:10px 13px;
      font-size:12px;
      color:var(--muted);
      font-weight:750;
      min-height:42px;
      white-space:nowrap;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      flex-shrink:0;
    }

    .dot.ok{background:var(--ok);}
    .dot.ld{background:var(--warn);animation:pulse 1.2s infinite;}
    .dot.er{background:var(--err);}

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.35}
    }

    .icon-actions{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .icon-btn{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel-2);
      color:var(--muted);
      cursor:pointer;
      transition:.16s ease;
      font-size:17px;
      flex-shrink:0;
    }

    .icon-btn:hover{
      border-color:var(--accent);
      color:var(--accent);
    }

    .autoplay-bar{
      height:4px;
      background:var(--panel-2);
      overflow:hidden;
      display:none;
    }

    .autoplay-bar.on{
      display:block;
    }

    .autoplay-fill{
      width:0%;
      height:100%;
      background:var(--accent);
      transition:width .15s linear;
    }

    .stage{
      flex:1;
      padding:18px;
    }

    .grid5{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      align-items:start;
    }

    .grid5 > .pod-card.total{
      grid-column:1/-1;
    }

    .solo{
      min-height:calc(100vh - 180px);
      display:flex;
      align-items:stretch;
    }

    .solo .pod-card{
      width:100%;
    }

    .pod-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      padding:20px;
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .pod-card::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:5px;
      background:var(--prod-color,var(--accent));
    }

    .pod-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:22px;
    }

    .pod-title{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .pod-badge{
      padding:8px 12px;
      border-radius:12px;
      border:2px solid var(--prod-color,var(--accent));
      color:var(--prod-color,var(--accent));
      font-size:13px;
      font-weight:850;
      letter-spacing:.08em;
      flex-shrink:0;
    }

    .pod-name{
      font-size:24px;
      font-weight:850;
      letter-spacing:-.025em;
      line-height:1.05;
      min-width:0;
    }

    .pod-sum{
      text-align:right;
      flex-shrink:0;
    }

    .pod-sum-lbl{
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .pod-sum-val{
      margin-top:4px;
      font-size:34px;
      font-weight:850;
      line-height:1;
      color:var(--prod-color,var(--accent));
      font-variant-numeric:tabular-nums;
    }

    .podium{
      display:grid;
      grid-template-columns:1fr 1.15fr 1fr;
      align-items:end;
      gap:12px;
      flex:1;
    }

    .place{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      min-width:0;
      min-height:100%;
    }

    .place-stack{
      width:100%;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:10px;
      min-height:180px;
    }

    .tie-entry{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      padding:0 4px;
    }

    .tie-entry + .tie-entry{
      padding-top:10px;
      border-top:1px dashed var(--border);
    }

    .tie-name{
      width:100%;
      font-size:clamp(14px,1vw + 9px,18px);
      font-weight:800;
      line-height:1.18;
      overflow-wrap:anywhere;
    }

    .tie-loc{
      width:100%;
      font-size:clamp(10px,.35vw + 9px,12px);
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.06em;
      overflow-wrap:anywhere;
    }

    .place-val{
      font-size:38px;
      font-weight:850;
      line-height:1;
      margin-bottom:10px;
      font-variant-numeric:tabular-nums;
    }

    .place-val .u{
      font-size:.45em;
      color:var(--muted);
      margin-left:3px;
      font-weight:700;
    }

    .pedestal{
      width:100%;
      border-radius:18px 18px 6px 6px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .rank-num{
      font-size:40px;
      font-weight:950;
      color:rgba(255,255,255,.92);
    }

    .p1 .pedestal{height:120px;background:var(--gold);}
    .p2 .pedestal{height:92px;background:var(--silv);}
    .p3 .pedestal{height:74px;background:var(--bron);}

    .p1 .place-val{color:var(--gold);}
    .p2 .place-val{color:var(--silv);}
    .p3 .place-val{color:var(--bron);}

    .empty-place{
      opacity:.58;
    }

    .empty-place .place-stack{
      justify-content:center;
    }

    .ticker{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:16px 18px calc(16px + var(--tg-safe-bottom)) 18px;
      border-top:1px solid var(--border);
      background:var(--panel);
      flex-wrap:wrap;
    }

    .ticker-left{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .period-tag{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:850;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }

    .period-tag::before{
      content:"●";
      color:var(--accent);
    }

    .big{
      font-weight:850;
      color:var(--text);
      font-variant-numeric:tabular-nums;
    }

    .nodata{
      min-height:60vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .loader-card{
      text-align:center;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      padding:40px 28px;
      width:min(100%,520px);
      box-shadow:var(--shadow);
    }

    .loader-spinner{
      width:58px;
      height:58px;
      margin:0 auto 18px;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.08);
      border-top-color:var(--accent);
      animation:spin .9s linear infinite;
    }

    body.light .loader-spinner{
      border-color:rgba(0,0,0,.06);
      border-top-color:var(--accent);
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .loader-title{
      font-size:20px;
      font-weight:850;
      margin-bottom:8px;
    }

    .loader-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      overflow-wrap:anywhere;
    }

    .period-popup{
      display:none;
    }

    .period-popup.open{
      display:block;
      position:fixed;
      z-index:9999;
      top:88px;
      right:18px;
      width:min(480px,calc(100vw - 20px));
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.26);
      padding:18px;
    }

    .pp-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
    }

    .pp-title{
      font-size:18px;
      font-weight:850;
    }

    .pp-hint{
      margin-top:4px;
      font-size:13px;
      color:var(--muted);
    }

    .pp-reset{
      border:1px solid var(--border);
      background:transparent;
      color:var(--muted);
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:800;
    }

    .pp-years{
      display:flex;
      flex-direction:column;
      gap:18px;
      max-height:50vh;
      overflow:auto;
      padding-right:2px;
    }

    .pp-yhead{
      margin-bottom:10px;
      font-size:15px;
      font-weight:850;
      cursor:pointer;
    }

    .pp-mgrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .pp-mbtn{
      border:0;
      background:var(--panel-2);
      color:var(--text);
      border-radius:12px;
      padding:12px;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      transition:.16s ease;
    }

    .pp-mbtn:hover:not(:disabled){
      background:var(--accent-soft);
    }

    .pp-mbtn:disabled{
      opacity:.35;
      cursor:not-allowed;
      text-decoration:line-through;
    }

    .pp-mbtn.insel{
      background:var(--accent-soft);
    }

    .pp-mbtn.edge{
      background:var(--accent);
      color:#fff;
    }

    .pp-foot{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:18px;
    }

    .pp-btn{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
    }

    .pp-btn.primary{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    @media (min-width:1400px){
      .grid5{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .pod-card.total .pod-name{
        font-size:28px;
      }
    }

    @media (max-width:1180px){
      .hdr{
        grid-template-columns:1fr;
        align-items:start;
      }

      .hdr-right{
        justify-content:flex-start;
        width:100%;
      }

      .segmented-label{
        display:none;
      }

      .grid5{
        grid-template-columns:1fr;
      }

      .grid5 > .pod-card.total{
        grid-column:auto;
      }
    }

    @media (max-width:820px){
      .hdr{
        padding:14px;
        gap:12px;
      }

      .logo{
        width:46px;
        height:46px;
        border-radius:14px;
        font-size:22px;
      }

      .ttl{
        font-size:22px;
      }

      .subttl{
        font-size:12px;
      }

      .hdr-right{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:9px;
      }

      .segmented{
        width:100%;
        display:grid;
        grid-template-columns:repeat(3,1fr);
      }

      .segmented[data-control="mode"]{
        grid-template-columns:repeat(2,1fr);
      }

      .segmented-btn{
        text-align:center;
        padding:10px 8px;
        font-size:13px;
      }

      .period-btn,
      .status{
        width:100%;
      }

      .icon-actions{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        grid-column:1/-1;
        width:100%;
      }

      .icon-btn{
        width:100%;
      }

      .stage{
        padding:12px;
      }

      .pod-card{
        border-radius:20px;
        padding:16px;
      }

      .pod-head{
        margin-bottom:16px;
      }

      .pod-name{
        font-size:20px;
      }

      .pod-sum-val{
        font-size:28px;
      }

      .podium{
        grid-template-columns:1fr;
        gap:0;
      }

      .place{
        display:grid;
        grid-template-columns:minmax(0,1fr) 74px;
        grid-template-areas:
          "stack ped"
          "val ped";
        align-items:center;
        text-align:left;
        gap:8px 14px;
        padding:12px 0;
        border-bottom:1px solid var(--border);
        min-height:0;
      }

      .place:last-child{
        border-bottom:0;
      }

      .place-stack{
        grid-area:stack;
        min-height:0;
        margin-bottom:0;
        align-items:flex-start;
      }

      .tie-entry{
        align-items:flex-start;
        padding:0;
      }

      .tie-name{
        font-size:15px;
      }

      .tie-loc{
        font-size:11px;
      }

      .place-val{
        grid-area:val;
        margin:2px 0 0;
        font-size:28px;
      }

      .pedestal{
        grid-area:ped;
        height:78px !important;
        border-radius:16px;
      }

      .rank-num{
        font-size:32px;
      }

      .ticker{
        padding:14px 14px calc(14px + var(--tg-safe-bottom)) 14px;
      }

      .ticker-left{
        gap:10px 14px;
      }

      .period-popup.open{
        top:120px;
        left:10px;
        right:10px;
        width:auto;
      }
    }

    @media (max-width:520px){
      .hdr-right{
        grid-template-columns:1fr;
      }

      .brand{
        gap:11px;
      }

      .logo{
        width:42px;
        height:42px;
      }

      .ttl{
        font-size:20px;
      }

      .subttl{
        display:none;
      }

      .pod-head{
        display:grid;
        grid-template-columns:1fr auto;
        align-items:start;
        gap:12px;
      }

      .pod-title{
        align-items:flex-start;
      }

      .pod-badge{
        padding:7px 9px;
        font-size:12px;
        border-radius:10px;
      }

      .pod-name{
        font-size:18px;
      }

      .pod-sum{
        text-align:right;
      }

      .pod-sum-val{
        font-size:24px;
      }

      .place{
        grid-template-columns:minmax(0,1fr) 64px;
        gap:6px 12px;
        padding:11px 0;
      }

      .tie-name{
        font-size:14px;
      }

      .place-val{
        font-size:25px;
      }

      .pedestal{
        height:68px !important;
      }

      .rank-num{
        font-size:28px;
      }

      .ticker,
      .ticker-left{
        flex-direction:column;
        align-items:flex-start;
      }

      .loader-card{
        padding:30px 18px;
      }

      .period-popup.open{
        top:96px;
      }

      .pp-mbtn{
        padding:11px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="hdr">
      <div class="brand">
        <div class="logo">🏆</div>
        <div class="brand-text">
          <h1 class="ttl">ТОП-3 Продажи</h1>
          <div class="subttl">Dashboard · Production Edition</div>
        </div>
      </div>

      <div class="hdr-right">
        <div class="segmented" data-control="period">
          <span class="segmented-label">Период</span>
          <button class="segmented-btn active" data-period="month" type="button">Месяц</button>
          <button class="segmented-btn" data-period="quarter" type="button">Квартал</button>
          <button class="segmented-btn" data-period="year" type="button">Год</button>
        </div>

        <button class="period-btn" id="periodBtn" type="button">
          <svg class="period-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span id="periodBtnLabel">Свой период</span>
          <span>▾</span>
        </button>

        <div class="segmented" data-control="mode">
          <span class="segmented-label">Вид</span>
          <button class="segmented-btn active" data-mode="grid" type="button">Сетка</button>
          <button class="segmented-btn" data-mode="solo" type="button">Поочерёдно</button>
        </div>

        <div class="status">
          <span class="dot ld" id="statusDot"></span>
          <span id="statusText">Загрузка…</span>
        </div>

        <div class="icon-actions">
          <button class="icon-btn" id="themeBtn" type="button" title="Тема">🌙</button>
          <button class="icon-btn" id="refreshBtn" type="button" title="Обновить">↻</button>
          <button class="icon-btn" id="fullscreenBtn" type="button" title="На весь экран">⛶</button>
        </div>
      </div>
    </header>

    <div class="period-popup" id="periodPopup">
      <div class="pp-head">
        <div>
          <div class="pp-title">Выбор периода</div>
          <div class="pp-hint" id="ppHint">Выберите начало периода</div>
        </div>
        <button class="pp-reset" id="pickerResetBtn" type="button">Сбросить</button>
      </div>

      <div class="pp-years" id="ppYears"></div>

      <div class="pp-foot">
        <button class="pp-btn" id="pickerCancelBtn" type="button">Отмена</button>
        <button class="pp-btn primary" id="pickerApplyBtn" type="button">Применить</button>
      </div>
    </div>

    <div class="autoplay-bar" id="autoBar">
      <div class="autoplay-fill" id="autoFill"></div>
    </div>

    <main class="stage" id="stage">
      <div class="nodata" id="loader">
        <div class="loader-card">
          <div class="loader-spinner"></div>
          <div class="loader-title">Подключаемся к Google Sheets…</div>
          <div class="loader-text">Инициализация dashboard и загрузка данных.</div>
        </div>
      </div>
    </main>

    <footer class="ticker">
      <div class="ticker-left">
        <span class="period-tag" id="periodLabel">Текущий месяц</span>
        <span><span class="big" id="totalTp">—</span> ТП</span>
        <span><span class="big" id="totalSales">—</span> продаж</span>
      </div>
      <div class="ticker-right">
        <span id="lastUpdate">—</span>
      </div>
    </footer>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    (() => {
      const tg = window.Telegram?.WebApp;

      if (tg) {
        tg.ready();

        try { tg.expand(); } catch (e) {}
        try { tg.requestFullscreen?.(); } catch (e) {}

        if (tg.colorScheme === "light") {
          document.body.classList.add("light");
        }

        document.documentElement.style.setProperty(
          "--tg-safe-bottom",
          (tg.safeAreaInset?.bottom || 0) + "px"
        );
      } else {
        document.body.classList.add("light");
      }
    })();
  </script>

  <script>
    const PRODUCTS = ["AA", "FA", "FK", "FS"];
    const DISPLAY_ORDER = ["ALL", ...PRODUCTS];

    const AUTO_REFRESH_MS = 30 * 60 * 1000;
    const SOLO_INTERVAL_MS = 8000;

    const MONTH_SHORT = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
    const MONTH_LONG = [
      "Январь","Февраль","Март","Апрель","Май","Июнь",
      "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"
    ];

    const PRODUCT_TITLES = {
      ALL: "ОБЩИЕ ПРОДАЖИ",
      AA: "Продукт AA",
      FA: "Продукт FA",
      FK: "Продукт FK",
      FS: "Продукт FS",
    };

    const state = {
      rawData: null,
      years: [],
      period: null,
      preset: "month",
      mode: "grid",
      soloIdx: 0,
      soloTimer: null,
      autoTimer: null,
      autoProgressTimer: null,
      autoProgress: 0,
      pickerOpen: false,
      pickerStart: null,
      pickerEnd: null,
      pickerStage: 0,
    };

    const $ = id => document.getElementById(id);

    function setStatus(type, text) {
      $("statusDot").className = "dot " + type;
      $("statusText").textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>\"']/g, c => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;"
      }[c]));
    }

    function callServer(functionName, ...args) {
      return new Promise((resolve, reject) => {
        if (!window.google?.script?.run) {
          reject(new Error("google.script.run недоступен. Откройте страницу через Web App URL /exec."));
          return;
        }

        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(err => reject(new Error(err?.message || String(err))))
          [functionName](...args);
      });
    }

    function monthAbs(p) {
      return p.y * 12 + p.m;
    }

    function formatPeriodLabel(period) {
      if (!period) return "—";

      if (period.start.y === period.end.y && period.start.m === period.end.m) {
        return MONTH_LONG[period.start.m] + " " + period.start.y;
      }

      if (period.start.y === period.end.y) {
        return MONTH_SHORT[period.start.m] + "–" + MONTH_SHORT[period.end.m] + " " + period.start.y;
      }

      return MONTH_SHORT[period.start.m] + " " + period.start.y + " — " +
             MONTH_SHORT[period.end.m] + " " + period.end.y;
    }

    function setPeriodPreset(preset) {
      const now = new Date();
      let y = now.getFullYear();
      let m = now.getMonth();

      if (state.years.length) {
        const maxYear = Math.max(...state.years);
        if (!state.rawData[y]) y = maxYear;
      }

      if (preset === "month") {
        state.period = {
          kind: "month",
          start: { y, m },
          end: { y, m },
        };
      }

      if (preset === "quarter") {
        const qStart = Math.floor(m / 3) * 3;
        state.period = {
          kind: "quarter",
          start: { y, m: qStart },
          end: { y, m: qStart + 2 },
        };
      }

      if (preset === "year") {
        state.period = {
          kind: "year",
          start: { y, m: 0 },
          end: { y, m: 11 },
        };
      }

      state.preset = preset;

      document.querySelectorAll("[data-period]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.period === preset);
      });

      $("periodBtn").classList.remove("active");
      $("periodBtnLabel").textContent = "Свой период";

      updatePeriodUI();
      render();
    }

    function updatePeriodUI() {
      $("periodLabel").textContent = formatPeriodLabel(state.period);
    }

    function forEachPeriodMonth(callback) {
      if (!state.period) return;

      const from = monthAbs(state.period.start);
      const to = monthAbs(state.period.end);

      for (let abs = from; abs <= to; abs++) {
        const y = Math.floor(abs / 12);
        const m = abs - y * 12;
        callback(y, m);
      }
    }

    function getRanking(product) {
      if (!state.rawData || !state.period) return [];

      const agg = {};

      forEachPeriodMonth((y, m) => {
        const yearData = state.rawData[String(y)];
        if (!yearData) return;

        yearData.employees.forEach(emp => {
          let add = 0;

          if (product === "ALL") {
            PRODUCTS.forEach(p => {
              add += emp.prod_f?.[p]?.[m] || 0;
            });
          } else {
            add += emp.prod_f?.[product]?.[m] || 0;
          }

          if (add <= 0) return;

          if (!agg[emp.name]) {
            agg[emp.name] = {
              name: emp.name,
              city: emp.city || "",
              region: emp.region || "",
              value: 0,
            };
          }

          agg[emp.name].value += add;
        });
      });

      return Object.values(agg).sort((a, b) => b.value - a.value);
    }

    function getTop3(ranking) {
      const result = [];
      let lastValue = null;

      for (const row of ranking) {
        if (row.value !== lastValue) {
          const rank = result.length + 1;
          if (rank > 3) break;

          result.push({
            rank,
            value: row.value,
            entries: [row],
          });

          lastValue = row.value;
        } else if (result.length) {
          result[result.length - 1].entries.push(row);
        }
      }

      while (result.length < 3) {
        result.push({
          rank: result.length + 1,
          value: 0,
          entries: [],
        });
      }

      return result.slice(0, 3);
    }

    function formatLocation(entry) {
      const parts = [];
      const city = String(entry?.city || "").trim();
      const region = String(entry?.region || "").trim();

      if (city) parts.push(city);
      if (region && region !== city) parts.push(region);

      return parts.length ? parts.join(" / ") : "—";
    }

    function buildEntry(entry) {
      const name = escapeHtml(entry.name || "—");
      const location = escapeHtml(formatLocation(entry));

      return `
        <div class="tie-entry">
          <div class="tie-name">${name}</div>
          <div class="tie-loc">${location}</div>
        </div>
      `;
    }

    function buildCard(product) {
      const ranking = getRanking(product);
      const top3 = getTop3(ranking);
      const total = ranking.reduce((sum, row) => sum + row.value, 0);

      const places = [top3[1], top3[0], top3[2]];

      return `
        <section class="pod-card ${product === "ALL" ? "total" : ""}" style="--prod-color:var(--p-${product})">
          <div class="pod-head">
            <div class="pod-title">
              <div class="pod-badge">${product}</div>
              <div class="pod-name">${escapeHtml(PRODUCT_TITLES[product] || product)}</div>
            </div>

            <div class="pod-sum">
              <div class="pod-sum-lbl">ВСЕГО</div>
              <div class="pod-sum-val">${total}</div>
            </div>
          </div>

          <div class="podium">
            ${places.map(place => buildPlace(place)).join("")}
          </div>
        </section>
      `;
    }

    function buildPlace(place) {
      const rank = place?.rank || 0;

      if (!place || !place.entries.length) {
        return `
          <div class="place p${rank} empty-place">
            <div class="place-stack">
              <div class="tie-entry">
                <div class="tie-name">— нет данных —</div>
                <div class="tie-loc">пусто</div>
              </div>
            </div>
            <div class="place-val">0<span class="u">шт</span></div>
            <div class="pedestal"><div class="rank-num">${rank}</div></div>
          </div>
        `;
      }

      return `
        <div class="place p${place.rank}">
          <div class="place-stack">
            ${place.entries.map(buildEntry).join("")}
          </div>
          <div class="place-val">${place.value}<span class="u">шт</span></div>
          <div class="pedestal"><div class="rank-num">${place.rank}</div></div>
        </div>
      `;
    }

    function render() {
      if (!state.rawData) return;

      stopSoloTimer();
      updatePeriodUI();

      const allRanking = getRanking("ALL");
      const totalEmployees = new Set(allRanking.map(row => row.name));
      const totalSales = allRanking.reduce((sum, row) => sum + row.value, 0);

      $("totalTp").textContent = totalEmployees.size;
      $("totalSales").textContent = totalSales;

      if (state.mode === "solo") {
        $("autoBar").classList.add("on");
        const product = DISPLAY_ORDER[state.soloIdx] || DISPLAY_ORDER[0];

        $("stage").innerHTML = `
          <div class="solo">
            ${buildCard(product)}
          </div>
        `;

        startSoloTimer();
        return;
      }

      $("autoBar").classList.remove("on");
      $("stage").innerHTML = `
        <div class="grid5">
          ${DISPLAY_ORDER.map(buildCard).join("")}
        </div>
      `;
    }

    function showError(error) {
      setStatus("er", "Ошибка");

      $("stage").innerHTML = `
        <div class="nodata">
          <div class="loader-card">
            <div style="font-size:44px;margin-bottom:14px">⚠️</div>
            <div class="loader-title">Не удалось загрузить данные</div>
            <div class="loader-text">${escapeHtml(error.message || error)}</div>
          </div>
        </div>
      `;
    }

    async function reload() {
      setStatus("ld", "Загрузка…");

      try {
        const res = await callServer("getDashboardData");

        if (!res || !res.ok) {
          throw new Error(res?.error || "Сервер вернул пустой ответ.");
        }

        state.rawData = res.data || {};
        state.years = Array.isArray(res.years) ? res.years : Object.keys(state.rawData).map(Number);

        if (!state.years.length) {
          throw new Error("Нет данных для отображения.");
        }

        if (!state.period) {
          setPeriodPreset("month");
        } else {
          render();
        }

        setStatus("ok", "Данные загружены");

        $("lastUpdate").textContent =
          "Обновлено: " + new Date().toLocaleTimeString("ru-RU", {
            hour: "2-digit",
            minute: "2-digit",
          });
      } catch (error) {
        console.error(error);
        showError(error);
      }
    }

    function setMode(mode) {
      state.mode = mode;
      state.soloIdx = 0;

      document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      render();
    }

    function startSoloTimer() {
      stopSoloTimer();

      state.autoProgress = 0;
      updateAutoFill();

      state.autoProgressTimer = setInterval(() => {
        state.autoProgress += (200 / SOLO_INTERVAL_MS) * 100;
        if (state.autoProgress > 100) state.autoProgress = 100;
        updateAutoFill();
      }, 200);

      state.soloTimer = setTimeout(() => {
        state.soloIdx = (state.soloIdx + 1) % DISPLAY_ORDER.length;
        render();
      }, SOLO_INTERVAL_MS);
    }

    function stopSoloTimer() {
      if (state.soloTimer) {
        clearTimeout(state.soloTimer);
        state.soloTimer = null;
      }

      if (state.autoProgressTimer) {
        clearInterval(state.autoProgressTimer);
        state.autoProgressTimer = null;
      }

      state.autoProgress = 0;
      updateAutoFill();
    }

    function updateAutoFill() {
      $("autoFill").style.width = state.autoProgress + "%";
    }

    function availableMonthsForYear(year) {
      const yearData = state.rawData?.[String(year)];
      if (!yearData) return [];

      const seen = new Set();

      yearData.employees.forEach(emp => {
        PRODUCTS.forEach(product => {
          const arr = emp.prod_f?.[product] || [];
          for (let m = 0; m < 12; m++) {
            if ((arr[m] || 0) > 0) seen.add(m);
          }
        });
      });

      return Array.from(seen).sort((a, b) => a - b);
    }

    function openPicker() {
      if (!state.rawData) return;

      state.pickerOpen = true;
      $("periodPopup").classList.add("open");
      $("periodBtn").classList.add("active");

      state.pickerStart = state.period ? { ...state.period.start } : null;
      state.pickerEnd = state.period ? { ...state.period.end } : null;
      state.pickerStage = 0;

      buildPicker();
    }

    function closePicker() {
      state.pickerOpen = false;
      $("periodPopup").classList.remove("open");

      if (state.preset !== "custom") {
        $("periodBtn").classList.remove("active");
      }
    }

    function buildPicker() {
      const container = $("ppYears");
      container.innerHTML = "";

      state.years
        .slice()
        .sort((a, b) => b - a)
        .forEach(year => {
          const available = availableMonthsForYear(year);

          const col = document.createElement("div");
          col.className = "pp-ycol";

          const head = document.createElement("div");
          head.className = "pp-yhead";
          head.textContent = year;
          head.title = "Выбрать весь год";
          head.addEventListener("click", () => {
            if (!available.length) return;
            state.pickerStart = { y: year, m: available[0] };
            state.pickerEnd = { y: year, m: available[available.length - 1] };
            state.pickerStage = 0;
            refreshPicker();
          });

          const grid = document.createElement("div");
          grid.className = "pp-mgrid";

          for (let m = 0; m < 12; m++) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "pp-mbtn";
            btn.textContent = MONTH_SHORT[m];
            btn.dataset.y = String(year);
            btn.dataset.m = String(m);
            btn.disabled = !available.includes(m);
            grid.appendChild(btn);
          }

          grid.addEventListener("click", event => {
            const btn = event.target.closest(".pp-mbtn");
            if (!btn || btn.disabled) return;

            const point = {
              y: Number(btn.dataset.y),
              m: Number(btn.dataset.m),
            };

            if (state.pickerStage === 0) {
              state.pickerStart = point;
              state.pickerEnd = null;
              state.pickerStage = 1;
            } else {
              if (monthAbs(point) < monthAbs(state.pickerStart)) {
                state.pickerEnd = state.pickerStart;
                state.pickerStart = point;
              } else {
                state.pickerEnd = point;
              }

              state.pickerStage = 0;
            }

            refreshPicker();
          });

          col.appendChild(head);
          col.appendChild(grid);
          container.appendChild(col);
        });

      refreshPicker();
    }

    function refreshPicker() {
      const start = state.pickerStart;
      const end = state.pickerEnd || state.pickerStart;

      document.querySelectorAll(".pp-mbtn").forEach(btn => {
        const point = {
          y: Number(btn.dataset.y),
          m: Number(btn.dataset.m),
        };

        btn.classList.remove("insel", "edge");

        if (!start || !end) return;

        const abs = monthAbs(point);
        const from = monthAbs(start);
        const to = monthAbs(end);

        if (abs >= from && abs <= to) {
          btn.classList.add("insel");
        }

        if (
          (point.y === start.y && point.m === start.m) ||
          (state.pickerEnd && point.y === state.pickerEnd.y && point.m === state.pickerEnd.m)
        ) {
          btn.classList.add("edge");
        }
      });

      $("ppHint").textContent = state.pickerStage === 1
        ? "Теперь выберите конец периода"
        : (state.pickerStart ? "Диапазон выбран — нажмите Применить" : "Выберите начало периода");
    }

    function resetPicker() {
      state.pickerStart = null;
      state.pickerEnd = null;
      state.pickerStage = 0;
      refreshPicker();
    }

    function applyPicker() {
      if (!state.pickerStart) {
        closePicker();
        return;
      }

      state.period = {
        kind: "custom",
        start: { ...state.pickerStart },
        end: { ...(state.pickerEnd || state.pickerStart) },
      };

      state.preset = "custom";

      document.querySelectorAll("[data-period]").forEach(btn => btn.classList.remove("active"));
      $("periodBtn").classList.add("active");
      $("periodBtnLabel").textContent = formatPeriodLabel(state.period);

      closePicker();
      updatePeriodUI();
      render();
    }

    function toggleTheme() {
      const isLight = !document.body.classList.contains("light");
      document.body.classList.toggle("light", isLight);
      $("themeBtn").textContent = isLight ? "☀️" : "🌙";

      try {
        localStorage.setItem("dashboard_theme", isLight ? "light" : "dark");
      } catch (e) {}
    }

    function restoreTheme() {
      try {
        const saved = localStorage.getItem("dashboard_theme");
        if (saved === "dark") {
          document.body.classList.remove("light");
          $("themeBtn").textContent = "🌙";
        } else if (saved === "light") {
          document.body.classList.add("light");
          $("themeBtn").textContent = "☀️";
        } else if (document.body.classList.contains("light")) {
          $("themeBtn").textContent = "☀️";
        }
      } catch (e) {}
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.().catch(() => {});
      } else {
        document.exitFullscreen?.().catch(() => {});
      }
    }

    function bindEvents() {
      document.querySelectorAll("[data-period]").forEach(btn => {
        btn.addEventListener("click", () => setPeriodPreset(btn.dataset.period));
      });

      document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.addEventListener("click", () => setMode(btn.dataset.mode));
      });

      $("periodBtn").addEventListener("click", event => {
        event.stopPropagation();
        if (state.pickerOpen) closePicker();
        else openPicker();
      });

      $("pickerResetBtn").addEventListener("click", resetPicker);
      $("pickerCancelBtn").addEventListener("click", closePicker);
      $("pickerApplyBtn").addEventListener("click", applyPicker);

      $("themeBtn").addEventListener("click", toggleTheme);
      $("refreshBtn").addEventListener("click", reload);
      $("fullscreenBtn").addEventListener("click", toggleFullscreen);

      document.addEventListener("mousedown", event => {
        if (!state.pickerOpen) return;

        const popup = $("periodPopup");
        const button = $("periodBtn");

        if (!popup.contains(event.target) && !button.contains(event.target)) {
          closePicker();
        }
      });
    }

    function boot() {
      restoreTheme();
      bindEvents();
      reload();

      state.autoTimer = setInterval(reload, AUTO_REFRESH_MS);
    }

    boot();
  </script>
</body>
</html>
