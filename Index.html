<!DOCTYPE html>
<html lang="ru" style="--tg-viewport-height: 100vh; --tg-viewport-stable-height: 100vh; --tg-safe-bottom: 0px;"><head><script src="//www.google.com/jsapi"></script><script>window.parent.maeExportApis_();</script>


  <base target="_top">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f3">
  <meta name="color-scheme" content="light dark">

  <title>🏆 ТОП-3 Продажи · ТВ</title>

  <style>
    :root{
      --bg:#282b30;
      --panel:#2f3238;
      --panel-2:#373a42;
      --border:#3d414a;
      --border-strong:#4a4e58;

      --text:#e8eaef;
      --text-dim:#c0c4cc;
      --muted:#8a8e98;

      --accent:#60a5fa;
      --accent-soft:#373a42;

      --p-ALL:#a78bfa;
      --p-AA:#f59e0b;
      --p-FA:#60a5fa;
      --p-FK:#34d399;
      --p-FS:#f472b6;

      --gold:#eab308;
      --silv:#cbd5e1;
      --bron:#d97757;

      --ok:#34d399;
      --warn:#f59e0b;
      --err:#f87171;

      --shadow:0 12px 40px rgba(0,0,0,.16);
      --tg-safe-bottom:0px;

      --header-height:auto;
    }

    body.light{
      --bg:#f5f5f3;
      --panel:#ffffff;
      --panel-2:#ecebe7;
      --border:#e0dfda;
      --border-strong:#cbcac5;

      --text:#1f2228;
      --text-dim:#3d4249;
      --muted:#6c7079;

      --accent:#2563eb;
      --accent-soft:#e8ebf2;

      --p-ALL:#7c3aed;
      --p-AA:#d97706;
      --p-FA:#2563eb;
      --p-FK:#059669;
      --p-FS:#db2777;

      --gold:#dca300;
      --silv:#8a97a8;
      --bron:#b45a35;

      --ok:#059669;
      --warn:#d97706;
      --err:#dc2626;

      --shadow:0 10px 30px rgba(15,23,42,.07);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
    }

    body.capture-mode,
    body.capture-mode .app{
      min-height:0;
    }

    button{
      font-family:inherit;
      -webkit-tap-highlight-color:transparent;
    }

    .app{
      width:100%;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .hdr{
      position:sticky;
      top:0;
      z-index:100;
      display:grid;
      grid-template-columns:minmax(260px,auto) 1fr;
      gap:16px;
      align-items:center;
      padding:16px 18px;
      border-bottom:1px solid var(--border);
      background:rgba(47,50,56,.9);
      backdrop-filter:blur(16px);
    }

    body.light .hdr{
      background:rgba(255,255,255,.9);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .logo{
      width:50px;
      height:50px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--gold),#facc15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:25px;
      flex-shrink:0;
      box-shadow:0 10px 30px rgba(234,179,8,.22);
    }

    .brand-text{
      min-width:0;
    }

    .ttl{
      font-size:25px;
      font-weight:850;
      line-height:1.05;
      letter-spacing:-.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subttl{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hdr-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      min-width:0;
      flex-wrap:wrap;
    }

    .segmented{
      display:flex;
      align-items:center;
      gap:4px;
      background:var(--panel-2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:4px;
      min-width:0;
    }

    .segmented-label{
      padding:0 9px;
      font-size:10px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      white-space:nowrap;
    }

    .segmented-btn{
      border:0;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      border-radius:10px;
      padding:10px 13px;
      font-size:13px;
      font-weight:800;
      transition:.16s ease;
      white-space:nowrap;
    }

    .segmented-btn:hover{
      color:var(--text);
    }

    .segmented-btn.active{
      background:var(--accent);
      color:#fff;
      box-shadow:0 5px 15px rgba(0,0,0,.12);
    }

    .period-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:1px solid var(--border);
      background:var(--panel-2);
      color:var(--text);
      border-radius:14px;
      padding:10px 14px;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      min-height:42px;
      transition:.16s ease;
      white-space:nowrap;
    }

    .period-btn:hover{
      border-color:var(--accent);
    }

    .period-btn.active{
      border-color:var(--accent);
      color:var(--accent);
    }

    .period-icon{
      width:17px;
      height:17px;
      stroke-width:2;
      flex-shrink:0;
    }

    .status{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:1px solid var(--border);
      background:var(--panel-2);
      border-radius:14px;
      padding:10px 13px;
      font-size:12px;
      color:var(--muted);
      font-weight:750;
      min-height:42px;
      white-space:nowrap;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      flex-shrink:0;
    }

    .dot.ok{background:var(--ok);}
    .dot.ld{background:var(--warn);animation:pulse 1.2s infinite;}
    .dot.er{background:var(--err);}

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.35}
    }

    .icon-actions{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .icon-btn{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel-2);
      color:var(--muted);
      cursor:pointer;
      transition:.16s ease;
      font-size:17px;
      flex-shrink:0;
    }

    .icon-btn:hover{
      border-color:var(--accent);
      color:var(--accent);
    }

    .autoplay-bar{
      height:4px;
      background:var(--panel-2);
      overflow:hidden;
      display:none;
    }

    .autoplay-bar.on{
      display:block;
    }

    .autoplay-fill{
      width:0%;
      height:100%;
      background:var(--accent);
      transition:width .15s linear;
    }

    .stage{
      flex:1 0 auto;
      padding:18px;
    }

    body.capture-mode .stage{
      flex:0 0 auto;
    }

    .grid5{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
    }

    .grid5 > .pod-card.total{
      grid-column:1/-1;
    }

    .solo{
      min-height:calc(100vh - 180px);
      display:flex;
      align-items:stretch;
    }

    .solo .pod-card{
      width:100%;
    }

    .pod-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      padding:20px;
      display:grid;
      grid-template-rows:auto minmax(0,1fr);
      height:100%;
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .pod-card:not(.total){
      min-height:320px;
    }

    .pod-card::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:5px;
      background:var(--prod-color,var(--accent));
    }

    .pod-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:22px;
    }

    .pod-title{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .pod-badge{
      padding:8px 12px;
      border-radius:12px;
      border:2px solid var(--prod-color,var(--accent));
      color:var(--prod-color,var(--accent));
      font-size:13px;
      font-weight:850;
      letter-spacing:.08em;
      flex-shrink:0;
    }

    .pod-name{
      font-size:24px;
      font-weight:850;
      letter-spacing:-.025em;
      line-height:1.05;
      min-width:0;
    }

    .pod-sum{
      text-align:right;
      flex-shrink:0;
    }

    .pod-sum-lbl{
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .pod-sum-val{
      margin-top:4px;
      font-size:34px;
      font-weight:850;
      line-height:1;
      color:var(--prod-color,var(--accent));
      font-variant-numeric:tabular-nums;
    }

    .podium{
      display:grid;
      grid-template-columns:1fr 1.15fr 1fr;
      align-items:stretch;
      align-content:end;
      gap:12px;
      min-height:228px;
      height:100%;
    }

    .pod-card.total .podium{
      min-height:194px;
    }

    .place{
      --pedestal-height:92px;
      display:grid;
      grid-template-rows:24px 58px 42px var(--pedestal-height);
      align-content:end;
      align-items:end;
      text-align:center;
      min-width:0;
      height:100%;
    }

    .place-name{
      width:100%;
      font-size:17px;
      font-weight:800;
      line-height:1.18;
      margin-bottom:6px;
      min-height:24px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .place-lines{
      width:100%;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:4px;
      margin-bottom:10px;
      min-height:58px;
      max-height:58px;
      overflow:hidden;
    }

    .place-line{
      max-width:100%;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.02em;
      line-height:1.22;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .place-name{grid-row:1;}
    .place-lines{grid-row:2;}
    .place-val{grid-row:3;}
    .pedestal{grid-row:4;}

    .place-line.ellipsis{
      font-weight:800;
      letter-spacing:.08em;
    }

    .place-val{
      font-size:38px;
      font-weight:850;
      line-height:1;
      margin-bottom:10px;
      font-variant-numeric:tabular-nums;
      min-height:42px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .place-val .u{
      font-size:.45em;
      color:var(--muted);
      margin-left:3px;
      font-weight:700;
    }

    .pedestal{
      width:100%;
      border-radius:18px 18px 6px 6px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .rank-num{
      font-size:40px;
      font-weight:950;
      color:rgba(255,255,255,.92);
    }

    .p1{--pedestal-height:120px;}
    .p2{--pedestal-height:92px;}
    .p3{--pedestal-height:74px;}
    .p1 .pedestal{height:var(--pedestal-height);background:var(--gold);}
    .p2 .pedestal{height:var(--pedestal-height);background:var(--silv);}
    .p3 .pedestal{height:var(--pedestal-height);background:var(--bron);}

    .p1 .place-val{color:var(--gold);}
    .p2 .place-val{color:var(--silv);}
    .p3 .place-val{color:var(--bron);}

    .empty-place{
      opacity:.58;
    }

    .ticker{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:16px 18px calc(16px + var(--tg-safe-bottom)) 18px;
      border-top:1px solid var(--border);
      background:var(--panel);
      flex-wrap:wrap;
    }

    .ticker-left{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .period-tag{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:850;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }

    .period-tag::before{
      content:"●";
      color:var(--accent);
    }

    .big{
      font-weight:850;
      color:var(--text);
      font-variant-numeric:tabular-nums;
    }

    .nodata{
      min-height:60vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .loader-card{
      text-align:center;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      padding:40px 28px;
      width:min(100%,520px);
      box-shadow:var(--shadow);
    }

    .loader-spinner{
      width:58px;
      height:58px;
      margin:0 auto 18px;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.08);
      border-top-color:var(--accent);
      animation:spin .9s linear infinite;
    }

    body.light .loader-spinner{
      border-color:rgba(0,0,0,.06);
      border-top-color:var(--accent);
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .loader-title{
      font-size:20px;
      font-weight:850;
      margin-bottom:8px;
    }

    .loader-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      overflow-wrap:anywhere;
    }

    .period-popup{
      display:none;
    }

    .period-popup.open{
      display:block;
      position:fixed;
      z-index:9999;
      top:88px;
      right:18px;
      width:min(480px,calc(100vw - 20px));
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.26);
      padding:18px;
    }

    .pp-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
    }

    .pp-title{
      font-size:18px;
      font-weight:850;
    }

    .pp-hint{
      margin-top:4px;
      font-size:13px;
      color:var(--muted);
    }

    .pp-reset{
      border:1px solid var(--border);
      background:transparent;
      color:var(--muted);
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:800;
    }

    .pp-years{
      display:flex;
      flex-direction:column;
      gap:18px;
      max-height:50vh;
      overflow:auto;
      padding-right:2px;
    }

    .pp-yhead{
      margin-bottom:10px;
      font-size:15px;
      font-weight:850;
      cursor:pointer;
    }

    .pp-mgrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .pp-mbtn{
      border:0;
      background:var(--panel-2);
      color:var(--text);
      border-radius:12px;
      padding:12px;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      transition:.16s ease;
    }

    .pp-mbtn:hover:not(:disabled){
      background:var(--accent-soft);
    }

    .pp-mbtn:disabled{
      opacity:.35;
      cursor:not-allowed;
      text-decoration:line-through;
    }

    .pp-mbtn.insel{
      background:var(--accent-soft);
    }

    .pp-mbtn.edge{
      background:var(--accent);
      color:#fff;
    }

    .pp-foot{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:18px;
    }

    .pp-btn{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
    }

    .pp-btn.primary{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    @media (min-width:1400px){
      .grid5{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .pod-card.total .pod-name{
        font-size:28px;
      }
    }

    @media (max-width:1180px){
      .hdr{
        grid-template-columns:1fr;
        align-items:start;
      }

      .hdr-right{
        justify-content:flex-start;
        width:100%;
      }

      .segmented-label{
        display:none;
      }

      .grid5{
        grid-template-columns:1fr;
      }

      .grid5 > .pod-card.total{
        grid-column:auto;
      }
    }

    @media (max-width:820px){
      .hdr{
        padding:14px;
        gap:12px;
      }

      .logo{
        width:46px;
        height:46px;
        border-radius:14px;
        font-size:22px;
      }

      .ttl{
        font-size:22px;
      }

      .subttl{
        font-size:12px;
      }

      .hdr-right{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:9px;
      }

      .segmented{
        width:100%;
        display:grid;
        grid-template-columns:repeat(3,1fr);
      }

      .segmented[data-control="mode"]{
        grid-template-columns:repeat(2,1fr);
      }

      .segmented-btn{
        text-align:center;
        padding:10px 8px;
        font-size:13px;
      }

      .period-btn,
      .status{
        width:100%;
      }

      .icon-actions{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        grid-column:1/-1;
        width:100%;
      }

      .icon-btn{
        width:100%;
      }

      .stage{
        padding:12px;
      }

      .pod-card{
        border-radius:20px;
        padding:16px;
      }

      .pod-card:not(.total){
        min-height:0;
      }

      .pod-head{
        margin-bottom:16px;
      }

      .pod-name{
        font-size:20px;
      }

      .pod-sum-val{
        font-size:28px;
      }

      .podium{
        grid-template-columns:1fr;
        gap:0;
        min-height:0;
        height:auto;
        align-content:stretch;
      }

      .place{
        display:grid;
        grid-template-columns:minmax(0,1fr) 74px;
        grid-template-areas:
          "name ped"
          "city ped"
          "val ped";
        grid-template-rows:auto auto auto;
        align-items:end;
        text-align:left;
        gap:4px 14px;
        padding:12px 0;
        border-bottom:1px solid var(--border);
      }

      .place:last-child{
        border-bottom:0;
      }

      .place-name{
        grid-area:name;
        min-height:0;
        margin:0;
        font-size:16px;
        white-space:nowrap;
      }

      .place-lines{
        grid-area:city;
        margin:0;
        min-height:0;
        max-height:none;
        overflow:visible;
      }

      .place-line{
        font-size:11px;
      }

      .place-val{
        grid-area:val;
        margin:4px 0 0;
        font-size:28px;
        min-height:0;
        justify-content:flex-start;
      }

      .pedestal{
        grid-area:ped;
        height:78px !important;
        border-radius:16px;
      }

      .rank-num{
        font-size:32px;
      }

      .ticker{
        padding:14px 14px calc(14px + var(--tg-safe-bottom)) 14px;
      }

      .ticker-left{
        gap:10px 14px;
      }

      .period-popup.open{
        top:120px;
        left:10px;
        right:10px;
        width:auto;
      }
    }

    @media (max-width:520px){
      .hdr-right{
        grid-template-columns:1fr;
      }

      .brand{
        gap:11px;
      }

      .logo{
        width:42px;
        height:42px;
      }

      .ttl{
        font-size:20px;
      }

      .subttl{
        display:none;
      }

      .pod-head{
        display:grid;
        grid-template-columns:1fr auto;
        align-items:start;
        gap:12px;
      }

      .pod-title{
        align-items:flex-start;
      }

      .pod-badge{
        padding:7px 9px;
        font-size:12px;
        border-radius:10px;
      }

      .pod-name{
        font-size:18px;
      }

      .pod-sum{
        text-align:right;
      }

      .pod-sum-val{
        font-size:24px;
      }

      .place{
        grid-template-columns:minmax(0,1fr) 64px;
        gap:4px 12px;
        padding:11px 0;
      }

      .place-name{
        font-size:15px;
      }

      .place-val{
        font-size:25px;
      }

      .pedestal{
        height:68px !important;
      }

      .rank-num{

  <script>
    (() => {

      if (tg) {

          try { tg.expand(); } catch (e) {}
          try { if (tg.disableVerticalSwipes) tg.disableVerticalSwipes(); } catch (e) {}
          try { if (tg.requestFullscreen) tg.requestFullscreen(); } catch (e) {}
        };

        requestTelegramFullscreen();
        setTimeout(requestTelegramFullscreen, 300);

        try {
          if (tg.onEvent) {
            tg.onEvent("viewportChanged", requestTelegramFullscreen);

        } catch (e) {}

        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) {

        });

        if (tg.colorScheme === "light") {
          document.body.classList.add("light");

        document.documentElement.style.setProperty(

        );

        document.body.classList.add("light");

    })();

  <script>
    const PRODUCTS = ["AA", "FA", "FK", "FS"];
    const DISPLAY_ORDER = ["ALL", ...PRODUCTS];

    const AUTO_REFRESH_MS = 30 * 60 * 1000;
    const SOLO_INTERVAL_MS = 8000;
    const MAX_TIE_PREVIEW = 5;
    const REQUEST_TIMEOUT_MS = 25000;

    const MONTH_SHORT = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
    const MONTH_LONG = [
      "январь","февраль","март","апрель","май","июнь",
      "июль","август","сентябрь","октябрь","ноябрь","декабрь"
    ];

    const PRODUCT_TITLES = {
      ALL: "ИТОГОВЫЕ ПРОДАЖИ",
      AA: "ArzonApteka",
      FA: "F-Apteka",
      FK: "F-Kassa",
      FS: "F-Summary",
    };

    const state = {
      rawData: null,
      years: [],
      period: null,
      preset: "month",
      mode: "grid",
      soloIdx: 0,
      soloTimer: null,
      autoTimer: null,
      autoProgressTimer: null,
      autoProgress: 0,
      pickerOpen: false,
      pickerStart: null,
      pickerEnd: null,
      pickerStage: 0,
      isReloading: false,
      consecutiveFailures: 0,
    };

    const $ = id => document.getElementById(id);

    function setStatus(type, text) {
      $("statusDot").className = "dot " + type;
      $("statusText").textContent = text;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[c];
      });
    }

    function callServer(functionName, ...args) {
      return new Promise((resolve, reject) => {
        if (!(window.google && window.google.script && window.google.script.run)) {
          reject(new Error("google.script.run недоступен. Откройте это через Apps Script /exec URL."));
          return;
        }

        let done = false;
        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          reject(new Error("Истекло время запроса."));
        }, REQUEST_TIMEOUT_MS);

        google.script.run
          .withSuccessHandler(res => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(res);
          })
          .withFailureHandler(err => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            reject(new Error((err && err.message) || String(err)));
          })
          [functionName](...args);
      });
    }

    function monthAbs(p) {
      return p.y * 12 + p.m;
    }

    function formatPeriodLabel(period) {
      if (!period) return "-";

      if (period.start.y === period.end.y && period.start.m === period.end.m) {
        return MONTH_LONG[period.start.m] + " " + period.start.y;
      }

      if (period.start.y === period.end.y) {
        return MONTH_SHORT[period.start.m] + "-" + MONTH_SHORT[period.end.m] + " " + period.start.y;
      }

      return MONTH_SHORT[period.start.m] + " " + period.start.y + " - " +
             MONTH_SHORT[period.end.m] + " " + period.end.y;
    }

    function setPeriodPreset(preset) {
      const now = new Date();
      let y = now.getFullYear();
      let m = now.getMonth();

      if (state.years.length) {
        const maxYear = Math.max(...state.years);
        if (!state.rawData[y]) y = maxYear;
      }

      if (preset === "month") {
        state.period = { kind: "month", start: { y, m }, end: { y, m } };
      }

      if (preset === "quarter") {
        const qStart = Math.floor(m / 3) * 3;
        state.period = { kind: "quarter", start: { y, m: qStart }, end: { y, m: qStart + 2 } };
      }

      if (preset === "year") {
        state.period = { kind: "year", start: { y, m: 0 }, end: { y, m: 11 } };
      }

      state.preset = preset;

      document.querySelectorAll("[data-period]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.period === preset);
      });

      $("periodBtn").classList.remove("active");
      $("periodBtnLabel").textContent = "Произвольный период";

      updatePeriodUI();
      render();
    }

    function updatePeriodUI() {
      $("periodLabel").textContent = formatPeriodLabel(state.period);
    }

    function forEachPeriodMonth(callback) {
      if (!state.period) return;
      const from = monthAbs(state.period.start);
      const to = monthAbs(state.period.end);
      for (let abs = from; abs <= to; abs++) {
        const y = Math.floor(abs / 12);
        const m = abs - y * 12;
        callback(y, m);
      }
    }

    function getRanking(product) {
      if (!state.rawData || !state.period) return [];
      const agg = {};

      forEachPeriodMonth((y, m) => {
        const yearData = state.rawData[String(y)];
        if (!yearData) return;

        yearData.employees.forEach(emp => {
          // skip region header rows if they somehow ended up in employees
          if (emp && emp.name && /^R\d+\s*[:\-]?\s*$/i.test(emp.name)) return;
          let add = 0;
          if (product === "ALL") {
            PRODUCTS.forEach(p => {
              add += (((emp.prod_f && emp.prod_f[p]) ? emp.prod_f[p][m] : 0) || 0);
            });
          } else {
            add += (((emp.prod_f && emp.prod_f[product]) ? emp.prod_f[product][m] : 0) || 0);
          }

          if (add <= 0) return;

          if (!agg[emp.name]) {
            agg[emp.name] = {
              name: emp.name,
              city: emp.city || "",
              region: emp.region || "",
              value: 0,
            };
          }

          agg[emp.name].value += add;
        });
      });

      return Object.values(agg).sort((a, b) => b.value - a.value);
    }

    function getTop3(ranking) {
      const result = [];
      let lastValue = null;

      for (const row of ranking) {
        if (row.value !== lastValue) {
          const rank = result.length + 1;
          if (rank > 3) break;
          result.push({ rank, value: row.value, entries: [row] });
          lastValue = row.value;
        } else if (result.length) {
          result[result.length - 1].entries.push(row);
        }
      }

      while (result.length < 3) {
        result.push({ rank: result.length + 1, value: 0, entries: [] });
      }

      return result.slice(0, 3);
    }

    function buildCard(product) {
      const ranking = getRanking(product);
      const top3 = getTop3(ranking);
      const total = ranking.reduce((sum, row) => sum + row.value, 0);
      const places = [top3[1], top3[0], top3[2]];

      return `
        <section class="pod-card ${product === "ALL" ? "total" : ""}" style="--prod-color:var(--p-${product})">
          <div class="pod-head">
            <div class="pod-title">
              <div class="pod-badge">${product}</div>
              <div class="pod-name">${escapeHtml(PRODUCT_TITLES[product] || product)}</div>
            </div>

            <div class="pod-sum">
              <div class="pod-sum-lbl">Итого</div>
              <div class="pod-sum-val">${total}</div>
            </div>
          </div>

          <div class="podium">
            ${places.map(place => buildPlace(place)).join("")}
          </div>
        </section>
      `;
    }

    function buildPlace(place) {
      if (!place || !place.entries.length) {
        const rank = (place && place.rank) || 0;
        return `
          <div class="place p${rank} empty-place">
            <div class="place-name">- нет данных -</div>
            <div class="place-lines">
              <div class="place-line">empty</div>
            </div>
            <div class="place-val">0<span class="u">шт</span></div>
            <div class="pedestal"><div class="rank-num">${rank}</div></div>
          </div>
        `;
      }

      const visible = place.entries.slice(0, MAX_TIE_PREVIEW);
      const hasMore = place.entries.length > MAX_TIE_PREVIEW;
      const allLinesText = place.entries.map(e => formatPlaceLineText(e)).join("\n");
      const visibleLines = visible.map(e => formatPlaceLineText(e));
      const firstLine = visibleLines[0] || "-";
      const previewLines = visibleLines
        .slice(1)
        .map(line => `<div class="place-line">${escapeHtml(line)}</div>`)
        .join("");
      const ellipsisLine = hasMore ? `<div class="place-line ellipsis">...</div>` : "";
      return `
        <div class="place p${place.rank}">
          <div class="place-name" title="${escapeHtml(allLinesText)}">${escapeHtml(firstLine)}</div>
          <div class="place-lines" title="${escapeHtml(allLinesText)}">${previewLines}${ellipsisLine}</div>
          <div class="place-val">${place.value}<span class="u">шт.</span></div>
          <div class="pedestal"><div class="rank-num">${place.rank}</div></div>
        </div>
      `;
    }

    function formatPlaceLineText(entry) {
      const region = entry.region || entry.city || "-";
      return `${entry.name} \u2022 ${region}`;
    }

    function render() {
      if (!state.rawData) return;
      stopSoloTimer();
      updatePeriodUI();

      const allRanking = getRanking("ALL");
      const totalEmployees = new Set(allRanking.map(row => row.name));
      const totalSales = allRanking.reduce((sum, row) => sum + row.value, 0);

      $("totalTp").textContent = totalEmployees.size;
      $("totalSales").textContent = totalSales;

      if (state.mode === "solo") {
        $("autoBar").classList.add("on");
        const product = DISPLAY_ORDER[state.soloIdx] || DISPLAY_ORDER[0];
        $("stage").innerHTML = `<div class="solo">${buildCard(product)}</div>`;
        startSoloTimer();
        return;
      }

      $("autoBar").classList.remove("on");
      $("stage").innerHTML = `<div class="grid5">${DISPLAY_ORDER.map(buildCard).join("")}</div>`;
    }

    function showError(error) {
      setStatus("er", "Ошибка");
      $("stage").innerHTML = `
        <div class="nodata">
          <div class="loader-card">
            <div style="font-size:44px;margin-bottom:14px">!</div>
            <div class="loader-title">Не удалось загрузить данные</div>
            <div class="loader-text">${escapeHtml(error.message || error)}</div>
          </div>
        </div>
      `;
    }

    async function reload() {
      if (state.isReloading) return;
      state.isReloading = true;
      setStatus("ld", "Загрузка...");

      try {
        const res = await callServer("getDashboardData");
        if (!res || !res.ok) {
          throw new Error((res && res.error) || "Сервер вернул пустой ответ.");
        }

        state.rawData = res.data || {};
        // client-side fallback: if backend returned a regionMap (from R1/R2... -> name),
        // replace any city/region tokens that are still in R# form.
        state.regionMap = (res.meta && res.meta.regionMap) || {};

        if (state.regionMap && Object.keys(state.regionMap).length) {
          Object.keys(state.rawData).forEach(function (yr) {
            const yearData = state.rawData[yr] || {};
            const emps = Array.isArray(yearData.employees) ? yearData.employees : [];

            emps.forEach(function (emp) {
              if (emp.city && /^R\d+$/i.test(emp.city)) {
                const mapped = state.regionMap[emp.city.toUpperCase()];
                if (mapped) emp.city = mapped;
              }

              if (emp.region && /^R\d+$/i.test(emp.region)) {
                const mapped = state.regionMap[emp.region.toUpperCase()];
                if (mapped) emp.region = mapped;
              }
            });
          });
        }
        state.years = Array.isArray(res.years) ? res.years : Object.keys(state.rawData).map(Number);

        if (!state.years.length) {
          throw new Error("Данные для отображения отсутствуют.");
        }

        if (!state.period) {
          setPeriodPreset("month");
        } else {
          render();
        }

        state.consecutiveFailures = 0;
        setStatus("ok", "Данные загружены");
        $("lastUpdate").textContent = "Обновлено: " + new Date().toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit",
        });
      } catch (error) {
        state.consecutiveFailures += 1;
        console.error(error);
        showError(error);
      } finally {
        state.isReloading = false;
      }
    }

    function setMode(mode) {
      state.mode = mode;
      state.soloIdx = 0;
      document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
      render();
    }

    function startSoloTimer() {
      stopSoloTimer();
      state.autoProgress = 0;
      updateAutoFill();

      state.autoProgressTimer = setInterval(() => {
        state.autoProgress += (200 / SOLO_INTERVAL_MS) * 100;
        if (state.autoProgress > 100) state.autoProgress = 100;
        updateAutoFill();
      }, 200);

      state.soloTimer = setTimeout(() => {
        state.soloIdx = (state.soloIdx + 1) % DISPLAY_ORDER.length;
        render();
      }, SOLO_INTERVAL_MS);
    }

    function stopSoloTimer() {
      if (state.soloTimer) {
        clearTimeout(state.soloTimer);
        state.soloTimer = null;
      }
      if (state.autoProgressTimer) {
        clearInterval(state.autoProgressTimer);
        state.autoProgressTimer = null;
      }
      state.autoProgress = 0;
      updateAutoFill();
    }

    function updateAutoFill() {
      $("autoFill").style.width = state.autoProgress + "%";
    }

    function availableMonthsForYear(year) {
      const yearData = state.rawData ? state.rawData[String(year)] : null;
      if (!yearData) return [];

      const seen = new Set();
      yearData.employees.forEach(emp => {
        PRODUCTS.forEach(product => {
          const arr = (emp.prod_f && emp.prod_f[product]) ? emp.prod_f[product] : [];
          for (let m = 0; m < 12; m++) {
            if ((arr[m] || 0) > 0) seen.add(m);
          }
        });
      });

      return Array.from(seen).sort((a, b) => a - b);
    }

    function openPicker() {
      if (!state.rawData) return;
      state.pickerOpen = true;
      $("periodPopup").classList.add("open");
      $("periodBtn").classList.add("active");

      state.pickerStart = state.period ? { y: state.period.start.y, m: state.period.start.m } : null;
      state.pickerEnd = state.period ? { y: state.period.end.y, m: state.period.end.m } : null;
      state.pickerStage = 0;
      buildPicker();
    }

    function closePicker() {
      state.pickerOpen = false;
      $("periodPopup").classList.remove("open");
      if (state.preset !== "custom") {
        $("periodBtn").classList.remove("active");
      }
    }

    function buildPicker() {
      const container = $("ppYears");
      container.innerHTML = "";

      state.years.slice().sort((a, b) => b - a).forEach(year => {
        const available = availableMonthsForYear(year);
        const col = document.createElement("div");
        col.className = "pp-ycol";

        const head = document.createElement("div");
        head.className = "pp-yhead";
        head.textContent = String(year);
        head.title = "Выбрать весь год";
        head.addEventListener("click", () => {
          if (!available.length) return;
          state.pickerStart = { y: year, m: available[0] };
          state.pickerEnd = { y: year, m: available[available.length - 1] };
          state.pickerStage = 0;
          refreshPicker();
        });

        const grid = document.createElement("div");
        grid.className = "pp-mgrid";

        for (let m = 0; m < 12; m++) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "pp-mbtn";
          btn.textContent = MONTH_SHORT[m];
          btn.dataset.y = String(year);
          btn.dataset.m = String(m);
          btn.disabled = !available.includes(m);
          grid.appendChild(btn);
        }

        grid.addEventListener("click", event => {
          const btn = event.target.closest(".pp-mbtn");
          if (!btn || btn.disabled) return;

          const point = { y: Number(btn.dataset.y), m: Number(btn.dataset.m) };
          if (state.pickerStage === 0) {
            state.pickerStart = point;
            state.pickerEnd = null;
            state.pickerStage = 1;
          } else {
            if (monthAbs(point) < monthAbs(state.pickerStart)) {
              state.pickerEnd = state.pickerStart;
              state.pickerStart = point;
            } else {
              state.pickerEnd = point;
            }
            state.pickerStage = 0;
          }
          refreshPicker();
        });

        col.appendChild(head);
        col.appendChild(grid);
        container.appendChild(col);
      });

      refreshPicker();
    }

    function refreshPicker() {
      const start = state.pickerStart;
      const end = state.pickerEnd || state.pickerStart;

      document.querySelectorAll(".pp-mbtn").forEach(btn => {
        const point = { y: Number(btn.dataset.y), m: Number(btn.dataset.m) };
        btn.classList.remove("insel", "edge");

        if (!start || !end) return;

        const abs = monthAbs(point);
        const from = monthAbs(start);
        const to = monthAbs(end);

        if (abs >= from && abs <= to) btn.classList.add("insel");

        if (
          (point.y === start.y && point.m === start.m) ||
          (state.pickerEnd && point.y === state.pickerEnd.y && point.m === state.pickerEnd.m)
        ) {
          btn.classList.add("edge");
        }
      });

      $("ppHint").textContent = state.pickerStage === 1
        ? "Выберите конец периода"
        : (state.pickerStart ? "Диапазон выбран - нажмите Применить" : "Выберите начало периода");
    }

    function resetPicker() {
      state.pickerStart = null;
      state.pickerEnd = null;
      state.pickerStage = 0;
      refreshPicker();
    }

    function applyPicker() {
      if (!state.pickerStart) {
        closePicker();
        return;
      }

      state.period = {
        kind: "custom",
        start: { ...state.pickerStart },
        end: { ...(state.pickerEnd || state.pickerStart) },
      };

      state.preset = "custom";
      document.querySelectorAll("[data-period]").forEach(btn => btn.classList.remove("active"));
      $("periodBtn").classList.add("active");
      $("periodBtnLabel").textContent = formatPeriodLabel(state.period);

      closePicker();
      updatePeriodUI();
      render();
    }

    function toggleTheme() {
      const isLight = !document.body.classList.contains("light");
      document.body.classList.toggle("light", isLight);
      $("themeBtn").textContent = isLight ? "L" : "D";
      try {
        localStorage.setItem("dashboard_theme", isLight ? "light" : "dark");
      } catch (e) {}
    }

    function restoreTheme() {
      try {
        const saved = localStorage.getItem("dashboard_theme");
        if (saved === "dark") {
          document.body.classList.remove("light");
          $("themeBtn").textContent = "D";
        } else if (saved === "light") {
          document.body.classList.add("light");
          $("themeBtn").textContent = "L";
        } else if (document.body.classList.contains("light")) {
          $("themeBtn").textContent = "L";
        }
      } catch (e) {}
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(() => {}); }
      } else {
        if (document.exitFullscreen) { document.exitFullscreen().catch(() => {}); }
      }
    }

    function bindEvents() {
      document.querySelectorAll("[data-period]").forEach(btn => {
        btn.addEventListener("click", () => setPeriodPreset(btn.dataset.period));
      });

      document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.addEventListener("click", () => setMode(btn.dataset.mode));
      });

      $("periodBtn").addEventListener("click", event => {
        event.stopPropagation();
        if (state.pickerOpen) closePicker();
        else openPicker();
      });

      $("pickerResetBtn").addEventListener("click", resetPicker);
      $("pickerCancelBtn").addEventListener("click", closePicker);
      $("pickerApplyBtn").addEventListener("click", applyPicker);

      $("themeBtn").addEventListener("click", toggleTheme);
      $("refreshBtn").addEventListener("click", reload);
      $("fullscreenBtn").addEventListener("click", toggleFullscreen);

      document.addEventListener("mousedown", event => {
        if (!state.pickerOpen) return;
        const popup = $("periodPopup");
        const button = $("periodBtn");
        if (!popup.contains(event.target) && !button.contains(event.target)) {
          closePicker();
        }
      });
    }

    function boot() {
      restoreTheme();
      bindEvents();
      reload();
      state.autoTimer = setInterval(reload, AUTO_REFRESH_MS);
    }

    boot();
  </script>
</body></html>
