<!DOCTYPE html>
<html lang="ru">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#f5f5f3">
  <meta name="color-scheme" content="light dark">
  <title>🏆 ТОП-3 Продажи · ТВ</title>
  <style>
    :root{
      --bg:#f3f2ee;
      --panel:#ffffff;
      --panel-2:#ebe8e0;
      --line:#ddd8ce;
      --text:#1f232b;
      --muted:#6f7480;
      --accent:#2563eb;

      --p-ALL:#7c3aed;
      --p-AA:#d97706;
      --p-FA:#2563eb;
      --p-FK:#059669;
      --p-FS:#db2777;

      --gold:#dca300;
      --silv:#94a3b8;
      --bron:#b45a35;

      --ok:#059669;
      --warn:#d97706;
      --err:#dc2626;
      --shadow:0 10px 24px rgba(15,23,42,.06);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    body.dark{
      --bg:#262a30;
      --panel:#2f3339;
      --panel-2:#3a3f47;
      --line:#464b55;
      --text:#edf1f6;
      --muted:#a7afbc;
      --accent:#60a5fa;
      --p-AA:#f59e0b;
      --p-FA:#60a5fa;
      --p-FK:#34d399;
      --p-FS:#f472b6;
      --gold:#eab308;
      --silv:#94a3b8;
      --bron:#c26a3f;
      --ok:#34d399;
      --warn:#f59e0b;
      --err:#f87171;
      --shadow:0 12px 28px rgba(0,0,0,.18);
    }

    button{
      font:inherit;
      -webkit-tap-highlight-color:transparent;
    }

    .app{
      width:100vw;
      height:100vh;
      display:grid;
      grid-template-rows:84px 1fr 44px;
      overflow:hidden;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.06), transparent 28%),
        radial-gradient(circle at top right, rgba(124,58,237,.05), transparent 24%),
        var(--bg);
    }

    .hdr{
      display:grid;
      grid-template-columns:minmax(260px,auto) 1fr;
      gap:14px;
      align-items:center;
      padding:12px 18px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(16px);
    }

    body.dark .hdr{
      background:rgba(38,42,48,.82);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .logo{
      width:44px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      background:linear-gradient(135deg,#ffd54f,#f4b400);
      box-shadow:0 10px 24px rgba(234,179,8,.24);
      flex-shrink:0;
    }

    .brand-text{
      min-width:0;
    }

    .ttl{
      font-size:19px;
      font-weight:900;
      letter-spacing:-.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subttl{
      margin-top:2px;
      color:var(--muted);
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hdr-right{
      min-width:0;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .segmented{
      display:flex;
      align-items:center;
      gap:4px;
      padding:4px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel-2);
    }

    .segmented-label{
      padding:0 8px;
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .segmented-btn,
    .period-btn,
    .icon-btn,
    .pp-reset,
    .pp-btn{
      border:0;
      cursor:pointer;
      transition:.15s ease;
    }

    .segmented-btn{
      border-radius:10px;
      background:transparent;
      color:var(--muted);
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .segmented-btn.active{
      background:var(--accent);
      color:#fff;
      box-shadow:0 8px 20px rgba(37,99,235,.2);
    }

    .period-btn,
    .status{
      min-height:38px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel-2);
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    .period-btn.active{
      color:var(--accent);
      border-color:var(--accent);
    }

    .period-icon{
      width:16px;
      height:16px;
      stroke-width:2;
      flex-shrink:0;
    }

    .status{
      color:var(--muted);
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      flex-shrink:0;
    }

    .dot.ok{background:var(--ok);}
    .dot.ld{background:var(--warn);animation:pulse 1.2s infinite;}
    .dot.er{background:var(--err);}

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.35}
    }

    .icon-actions{
      display:flex;
      gap:8px;
    }

    .icon-btn{
      width:38px;
      height:38px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--muted);
      font-size:15px;
    }

    .icon-btn:hover,
    .period-btn:hover{
      border-color:var(--accent);
      color:var(--accent);
    }

    .autoplay-bar{
      display:none;
      height:3px;
      background:var(--panel-2);
      overflow:hidden;
    }

    .autoplay-bar.on{
      display:block;
    }

    .autoplay-fill{
      width:0%;
      height:100%;
      background:var(--accent);
      transition:width .15s linear;
    }

    .stage{
      min-height:0;
      padding:12px 14px 10px;
      overflow:hidden;
    }

    .grid5{
      height:100%;
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      grid-template-rows:minmax(0, 1.08fr) minmax(0, .92fr);
      gap:12px;
      align-items:stretch;
    }

    .grid5 > .pod-card.total{
      grid-column:1 / -1;
    }

    .solo{
      height:100%;
    }

    .solo .pod-card{
      height:100%;
    }

    .pod-card{
      min-height:0;
      display:flex;
      flex-direction:column;
      padding:14px 16px 12px;
      border:1px solid var(--line);
      border-radius:20px;
      background:var(--panel);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .pod-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:4px;
      background:var(--prod-color, var(--accent));
    }

    .pod-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .pod-title{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .pod-badge{
      padding:6px 10px;
      border-radius:11px;
      border:2px solid var(--prod-color, var(--accent));
      color:var(--prod-color, var(--accent));
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      flex-shrink:0;
    }

    .pod-name{
      min-width:0;
      font-size:17px;
      font-weight:900;
      letter-spacing:-.03em;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .pod-sum{
      text-align:right;
      flex-shrink:0;
    }

    .pod-sum-lbl{
      font-size:10px;
      font-weight:800;
      color:var(--muted);
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .pod-sum-val{
      margin-top:2px;
      color:var(--prod-color, var(--accent));
      font-size:18px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }

    .pod-card.total .pod-name{
      font-size:18px;
    }

    .pod-card.total .pod-sum-val{
      font-size:20px;
    }

    .podium{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:8px;
      align-items:end;
    }

    .place{
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      text-align:center;
    }

    .place-stack{
      width:100%;
      min-height:0;
      max-height:78px;
      margin-bottom:8px;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      gap:7px;
      overflow:hidden;
    }

    .pod-card.total .place-stack{
      max-height:96px;
    }

    .tie-entry{
      width:100%;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:1px;
      align-items:center;
    }

    .tie-name,
    .tie-loc{
      width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .tie-name{
      font-size:13px;
      font-weight:850;
      line-height:1.08;
    }

    .pod-card.total .tie-name{
      font-size:14px;
    }

    .tie-loc{
      color:var(--muted);
      font-size:10px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .tie-more{
      font-size:18px;
      line-height:1;
      color:var(--muted);
      font-weight:900;
    }

    .place-val{
      margin-bottom:8px;
      font-size:28px;
      font-weight:900;
      line-height:1;
      font-variant-numeric:tabular-nums;
    }

    .place-val .u{
      margin-left:2px;
      font-size:.42em;
      color:var(--muted);
      font-weight:800;
    }

    .pod-card.total .place-val{
      font-size:30px;
    }

    .pedestal{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:16px 16px 6px 6px;
    }

    .rank-num{
      font-size:32px;
      font-weight:950;
      color:rgba(255,255,255,.94);
    }

    .p1 .pedestal{height:88px;background:var(--gold);}
    .p2 .pedestal{height:66px;background:var(--silv);}
    .p3 .pedestal{height:54px;background:var(--bron);}
    .p1 .place-val{color:var(--gold);}
    .p2 .place-val{color:var(--silv);}
    .p3 .place-val{color:var(--bron);}
    .empty-place{opacity:.58;}

    .nodata{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
    }

    .loader-card{
      width:min(100%, 520px);
      padding:28px 24px;
      border-radius:22px;
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .loader-spinner{
      width:50px;
      height:50px;
      margin:0 auto 14px;
      border-radius:50%;
      border:4px solid rgba(0,0,0,.08);
      border-top-color:var(--accent);
      animation:spin .9s linear infinite;
    }

    body.dark .loader-spinner{
      border-color:rgba(255,255,255,.08);
      border-top-color:var(--accent);
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .loader-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:6px;
    }

    .loader-text{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .period-popup{
      display:none;
    }

    .period-popup.open{
      display:block;
      position:fixed;
      right:14px;
      top:74px;
      z-index:200;
      width:420px;
      max-width:calc(100vw - 28px);
      padding:16px;
      border:1px solid var(--line);
      border-radius:22px;
      background:var(--panel);
      box-shadow:0 24px 64px rgba(0,0,0,.18);
    }

    .pp-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
    }

    .pp-title{
      font-size:16px;
      font-weight:900;
    }

    .pp-hint{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }

    .pp-reset,
    .pp-btn{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      font-size:13px;
      font-weight:800;
    }

    .pp-years{
      max-height:42vh;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .pp-yhead{
      margin-bottom:8px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
    }

    .pp-mgrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .pp-mbtn{
      border:0;
      border-radius:12px;
      background:var(--panel-2);
      color:var(--text);
      padding:11px 8px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .pp-mbtn:disabled{
      opacity:.35;
      cursor:not-allowed;
      text-decoration:line-through;
    }

    .pp-mbtn.insel{
      background:rgba(37,99,235,.12);
    }

    .pp-mbtn.edge{
      background:var(--accent);
      color:#fff;
    }

    .pp-foot{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      margin-top:14px;
    }

    .pp-btn.primary{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .ticker{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 16px;
      border-top:1px solid var(--line);
      background:rgba(255,255,255,.65);
      font-size:12px;
    }

    body.dark .ticker{
      background:rgba(38,42,48,.74);
    }

    .ticker-left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
      flex-wrap:wrap;
    }

    .period-tag{
      display:flex;
      align-items:center;
      gap:7px;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .period-tag::before{
      content:"●";
      color:var(--accent);
    }

    .big{
      font-size:13px;
      font-weight:900;
      color:var(--text);
      font-variant-numeric:tabular-nums;
    }

    .ticker-right{
      color:var(--muted);
      white-space:nowrap;
    }

    @media (max-width: 1400px){
      .app{
        grid-template-rows:120px 1fr 54px;
      }

      .hdr{
        grid-template-columns:1fr;
      }

      .hdr-right{
        justify-content:flex-start;
      }

      .grid5{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        grid-template-rows:repeat(3, minmax(0, 1fr));
      }

      .grid5 > .pod-card.total{
        grid-column:1 / -1;
      }
    }

    @media (max-width: 820px){
      html,
      body{
        overflow:auto;
      }

      .app{
        height:auto;
        min-height:100vh;
        grid-template-rows:auto auto auto;
      }

      .stage{
        overflow:visible;
      }

      .grid5,
      .solo{
        height:auto;
      }

      .grid5{
        display:grid;
        grid-template-columns:1fr;
        grid-template-rows:none;
      }

      .place-stack{
        max-height:none;
      }

      .podium{
        grid-template-columns:1fr;
      }

      .ticker{
        padding:12px 14px;
        flex-direction:column;
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hdr">
      <div class="brand">
        <div class="logo">🏆</div>
        <div class="brand-text">
          <h1 class="ttl">ТОП-3 Продажи</h1>
          <div class="subttl">Dashboard · 1920×1080</div>
        </div>
      </div>

      <div class="hdr-right">
        <div class="segmented" data-control="period">
          <span class="segmented-label">Период</span>
          <button class="segmented-btn active" data-period="month" type="button">Месяц</button>
          <button class="segmented-btn" data-period="quarter" type="button">Квартал</button>
          <button class="segmented-btn" data-period="year" type="button">Год</button>
        </div>

        <button class="period-btn" id="periodBtn" type="button">
          <svg class="period-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span id="periodBtnLabel">Свой период</span>
          <span>▾</span>
        </button>

        <div class="segmented" data-control="mode">
          <span class="segmented-label">Вид</span>
          <button class="segmented-btn active" data-mode="grid" type="button">Сетка</button>
          <button class="segmented-btn" data-mode="solo" type="button">Поочерёдно</button>
        </div>

        <div class="status">
          <span class="dot ld" id="statusDot"></span>
          <span id="statusText">Загрузка…</span>
        </div>

        <div class="icon-actions">
          <button class="icon-btn" id="themeBtn" type="button" title="Тема">☀</button>
          <button class="icon-btn" id="refreshBtn" type="button" title="Обновить">↻</button>
          <button class="icon-btn" id="fullscreenBtn" type="button" title="На весь экран">⛶</button>
        </div>
      </div>
    </header>

    <div class="period-popup" id="periodPopup">
      <div class="pp-head">
        <div>
          <div class="pp-title">Выбор периода</div>
          <div class="pp-hint" id="ppHint">Выберите начало периода</div>
        </div>
        <button class="pp-reset" id="pickerResetBtn" type="button">Сбросить</button>
      </div>

      <div class="pp-years" id="ppYears"></div>

      <div class="pp-foot">
        <button class="pp-btn" id="pickerCancelBtn" type="button">Отмена</button>
        <button class="pp-btn primary" id="pickerApplyBtn" type="button">Применить</button>
      </div>
    </div>

    <div class="autoplay-bar" id="autoBar">
      <div class="autoplay-fill" id="autoFill"></div>
    </div>

    <main class="stage" id="stage">
      <div class="nodata" id="loader">
        <div class="loader-card">
          <div class="loader-spinner"></div>
          <div class="loader-title">Подключаемся к Google Sheets…</div>
          <div class="loader-text">Инициализация dashboard и загрузка данных.</div>
        </div>
      </div>
    </main>

    <footer class="ticker">
      <div class="ticker-left">
        <span class="period-tag" id="periodLabel">Текущий месяц</span>
        <span><span class="big" id="totalTp">—</span> ТП</span>
        <span><span class="big" id="totalSales">—</span> продаж</span>
      </div>
      <div class="ticker-right">
        <span id="lastUpdate">—</span>
      </div>
    </footer>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (() => {
      const tg = window.Telegram?.WebApp;

      if (tg) {
        tg.ready();

        if (tg.colorScheme === "dark") {
          document.body.classList.add("dark");
        }
      }
    })();
  </script>

  <script>
    const PRODUCTS = ["AA", "FA", "FK", "FS"];
    const DISPLAY_ORDER = ["ALL", ...PRODUCTS];
    const PRODUCT_TITLES = {
      ALL: "Общие продажи",
      AA: "Продукт AA",
      FA: "Продукт FA",
      FK: "Продукт FK",
      FS: "Продукт FS",
    };
    const MONTH_SHORT = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
    const MONTH_LONG = [
      "Январь","Февраль","Март","Апрель","Май","Июнь",
      "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"
    ];
    const AUTO_REFRESH_MS = 30 * 60 * 1000;
    const SOLO_INTERVAL_MS = 8000;
    const MAX_VISIBLE_TIES = 2;

    const state = {
      rawData: null,
      years: [],
      period: null,
      preset: "month",
      mode: "grid",
      soloIdx: 0,
      soloTimer: null,
      autoTimer: null,
      autoProgressTimer: null,
      autoProgress: 0,
      pickerOpen: false,
      pickerStart: null,
      pickerEnd: null,
      pickerStage: 0,
    };

    const $ = id => document.getElementById(id);

    function setStatus(type, text) {
      $("statusDot").className = "dot " + type;
      $("statusText").textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>\"']/g, char => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;",
      }[char]));
    }

    function callServer(functionName, ...args) {
      return new Promise((resolve, reject) => {
        if (!window.google?.script?.run) {
          reject(new Error("google.script.run недоступен. Откройте страницу через Web App URL /exec."));
          return;
        }

        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(err => reject(new Error(err?.message || String(err))))
          [functionName](...args);
      });
    }

    function monthAbs(point) {
      return point.y * 12 + point.m;
    }

    function formatPeriodLabel(period) {
      if (!period) return "—";

      if (period.start.y === period.end.y && period.start.m === period.end.m) {
        return MONTH_LONG[period.start.m] + " " + period.start.y;
      }

      if (period.start.y === period.end.y) {
        return MONTH_SHORT[period.start.m] + "–" + MONTH_SHORT[period.end.m] + " " + period.start.y;
      }

      return (
        MONTH_SHORT[period.start.m] + " " + period.start.y +
        " — " +
        MONTH_SHORT[period.end.m] + " " + period.end.y
      );
    }

    function setPeriodPreset(preset) {
      const now = new Date();
      let y = now.getFullYear();
      let m = now.getMonth();

      if (state.years.length) {
        const maxYear = Math.max(...state.years);
        if (!state.rawData[y]) y = maxYear;
      }

      if (preset === "month") {
        state.period = { kind: "month", start: { y, m }, end: { y, m } };
      }

      if (preset === "quarter") {
        const qStart = Math.floor(m / 3) * 3;
        state.period = { kind: "quarter", start: { y, m: qStart }, end: { y, m: qStart + 2 } };
      }

      if (preset === "year") {
        state.period = { kind: "year", start: { y, m: 0 }, end: { y, m: 11 } };
      }

      state.preset = preset;
      document.querySelectorAll("[data-period]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.period === preset);
      });

      $("periodBtn").classList.remove("active");
      $("periodBtnLabel").textContent = "Свой период";

      updatePeriodUI();
      render();
    }

    function updatePeriodUI() {
      $("periodLabel").textContent = formatPeriodLabel(state.period);
    }

    function forEachPeriodMonth(callback) {
      if (!state.period) return;
      const from = monthAbs(state.period.start);
      const to = monthAbs(state.period.end);

      for (let abs = from; abs <= to; abs++) {
        const y = Math.floor(abs / 12);
        const m = abs - y * 12;
        callback(y, m);
      }
    }

    function getRanking(product) {
      if (!state.rawData || !state.period) return [];

      const agg = {};

      forEachPeriodMonth((y, m) => {
        const yearData = state.rawData[String(y)];
        if (!yearData) return;

        yearData.employees.forEach(emp => {
          let add = 0;

          if (product === "ALL") {
            PRODUCTS.forEach(code => {
              add += emp.prod_f?.[code]?.[m] || 0;
            });
          } else {
            add += emp.prod_f?.[product]?.[m] || 0;
          }

          if (add <= 0) return;

          if (!agg[emp.name]) {
            agg[emp.name] = {
              name: emp.name,
              city: emp.city || "",
              region: emp.region || "",
              value: 0,
            };
          }

          agg[emp.name].value += add;
        });
      });

      return Object.values(agg).sort((a, b) => b.value - a.value);
    }

    function getTop3(ranking) {
      const result = [];
      let lastValue = null;

      for (const row of ranking) {
        if (row.value !== lastValue) {
          const rank = result.length + 1;
          if (rank > 3) break;

          result.push({ rank, value: row.value, entries: [row] });
          lastValue = row.value;
        } else if (result.length) {
          result[result.length - 1].entries.push(row);
        }
      }

      while (result.length < 3) {
        result.push({ rank: result.length + 1, value: 0, entries: [] });
      }

      return result.slice(0, 3);
    }

    function formatLocation(entry) {
      const parts = [];
      const city = String(entry?.city || "").trim();
      const region = String(entry?.region || "").trim();

      if (city) parts.push(city);
      if (region && region !== city) parts.push(region);

      return parts.length ? parts.join(" · ") : "—";
    }

    function buildEntry(entry) {
      return `
        <div class="tie-entry">
          <div class="tie-name" title="${escapeHtml(entry.name)}">${escapeHtml(entry.name)}</div>
          <div class="tie-loc" title="${escapeHtml(formatLocation(entry))}">${escapeHtml(formatLocation(entry))}</div>
        </div>
      `;
    }

    function buildPlace(place) {
      const rank = place?.rank || 0;

      if (!place || !place.entries.length) {
        return `
          <div class="place p${rank} empty-place">
            <div class="place-stack">
              <div class="tie-entry">
                <div class="tie-name">— нет данных —</div>
                <div class="tie-loc">пусто</div>
              </div>
            </div>
            <div class="place-val">0<span class="u">шт</span></div>
            <div class="pedestal"><div class="rank-num">${rank}</div></div>
          </div>
        `;
      }

      const visibleEntries = place.entries.slice(0, MAX_VISIBLE_TIES);
      const hasMore = place.entries.length > MAX_VISIBLE_TIES;

      return `
        <div class="place p${place.rank}">
          <div class="place-stack">
            ${visibleEntries.map(buildEntry).join("")}
            ${hasMore ? '<div class="tie-more">...</div>' : ""}
          </div>
          <div class="place-val">${place.value}<span class="u">шт</span></div>
          <div class="pedestal"><div class="rank-num">${place.rank}</div></div>
        </div>
      `;
    }

    function buildCard(product) {
      const ranking = getRanking(product);
      const top3 = getTop3(ranking);
      const total = ranking.reduce((sum, row) => sum + row.value, 0);
      const places = [top3[1], top3[0], top3[2]];

      return `
        <section class="pod-card ${product === "ALL" ? "total" : ""}" style="--prod-color:var(--p-${product})">
          <div class="pod-head">
            <div class="pod-title">
              <div class="pod-badge">${product}</div>
              <div class="pod-name">${escapeHtml(PRODUCT_TITLES[product] || product)}</div>
            </div>
            <div class="pod-sum">
              <div class="pod-sum-lbl">Всего</div>
              <div class="pod-sum-val">${total}</div>
            </div>
          </div>

          <div class="podium">
            ${places.map(buildPlace).join("")}
          </div>
        </section>
      `;
    }

    function render() {
      if (!state.rawData) return;

      stopSoloTimer();
      updatePeriodUI();

      const allRanking = getRanking("ALL");
      const totalEmployees = new Set(allRanking.map(row => row.name));
      const totalSales = allRanking.reduce((sum, row) => sum + row.value, 0);

      $("totalTp").textContent = totalEmployees.size;
      $("totalSales").textContent = totalSales;

      if (state.mode === "solo") {
        $("autoBar").classList.add("on");
        const product = DISPLAY_ORDER[state.soloIdx] || DISPLAY_ORDER[0];
        $("stage").innerHTML = `<div class="solo">${buildCard(product)}</div>`;
        startSoloTimer();
        return;
      }

      $("autoBar").classList.remove("on");
      $("stage").innerHTML = `<div class="grid5">${DISPLAY_ORDER.map(buildCard).join("")}</div>`;
    }

    function showError(error) {
      setStatus("er", "Ошибка");

      $("stage").innerHTML = `
        <div class="nodata">
          <div class="loader-card">
            <div style="font-size:40px;margin-bottom:12px">⚠️</div>
            <div class="loader-title">Не удалось загрузить данные</div>
            <div class="loader-text">${escapeHtml(error.message || error)}</div>
          </div>
        </div>
      `;
    }

    async function reload() {
      setStatus("ld", "Загрузка…");

      try {
        const res = await callServer("getDashboardData");
        if (!res || !res.ok) {
          throw new Error(res?.error || "Сервер вернул пустой ответ.");
        }

        state.rawData = res.data || {};
        state.years = Array.isArray(res.years) ? res.years : Object.keys(state.rawData).map(Number);

        if (!state.years.length) {
          throw new Error("Нет данных для отображения.");
        }

        if (!state.period) {
          setPeriodPreset("month");
        } else {
          render();
        }

        setStatus("ok", "Данные загружены");
        $("lastUpdate").textContent =
          "Обновлено: " +
          new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
      } catch (error) {
        console.error(error);
        showError(error);
      }
    }

    function setMode(mode) {
      state.mode = mode;
      state.soloIdx = 0;

      document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      render();
    }

    function startSoloTimer() {
      stopSoloTimer();
      state.autoProgress = 0;
      updateAutoFill();

      state.autoProgressTimer = setInterval(() => {
        state.autoProgress += (200 / SOLO_INTERVAL_MS) * 100;
        if (state.autoProgress > 100) state.autoProgress = 100;
        updateAutoFill();
      }, 200);

      state.soloTimer = setTimeout(() => {
        state.soloIdx = (state.soloIdx + 1) % DISPLAY_ORDER.length;
        render();
      }, SOLO_INTERVAL_MS);
    }

    function stopSoloTimer() {
      if (state.soloTimer) {
        clearTimeout(state.soloTimer);
        state.soloTimer = null;
      }

      if (state.autoProgressTimer) {
        clearInterval(state.autoProgressTimer);
        state.autoProgressTimer = null;
      }

      state.autoProgress = 0;
      updateAutoFill();
    }

    function updateAutoFill() {
      $("autoFill").style.width = state.autoProgress + "%";
    }

    function availableMonthsForYear(year) {
      const yearData = state.rawData?.[String(year)];
      if (!yearData) return [];

      const seen = new Set();
      yearData.employees.forEach(emp => {
        PRODUCTS.forEach(product => {
          const arr = emp.prod_f?.[product] || [];
          for (let m = 0; m < 12; m++) {
            if ((arr[m] || 0) > 0) seen.add(m);
          }
        });
      });

      return Array.from(seen).sort((a, b) => a - b);
    }

    function openPicker() {
      if (!state.rawData) return;

      state.pickerOpen = true;
      $("periodPopup").classList.add("open");
      $("periodBtn").classList.add("active");
      state.pickerStart = state.period ? { ...state.period.start } : null;
      state.pickerEnd = state.period ? { ...state.period.end } : null;
      state.pickerStage = 0;
      buildPicker();
    }

    function closePicker() {
      state.pickerOpen = false;
      $("periodPopup").classList.remove("open");

      if (state.preset !== "custom") {
        $("periodBtn").classList.remove("active");
      }
    }

    function buildPicker() {
      const container = $("ppYears");
      container.innerHTML = "";

      state.years
        .slice()
        .sort((a, b) => b - a)
        .forEach(year => {
          const available = availableMonthsForYear(year);

          const col = document.createElement("div");
          const head = document.createElement("div");
          const grid = document.createElement("div");

          col.className = "pp-ycol";
          head.className = "pp-yhead";
          head.textContent = year;
          head.title = "Выбрать весь год";
          head.addEventListener("click", () => {
            if (!available.length) return;
            state.pickerStart = { y: year, m: available[0] };
            state.pickerEnd = { y: year, m: available[available.length - 1] };
            state.pickerStage = 0;
            refreshPicker();
          });

          grid.className = "pp-mgrid";
          for (let m = 0; m < 12; m++) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "pp-mbtn";
            btn.textContent = MONTH_SHORT[m];
            btn.dataset.y = String(year);
            btn.dataset.m = String(m);
            btn.disabled = !available.includes(m);
            grid.appendChild(btn);
          }

          grid.addEventListener("click", event => {
            const btn = event.target.closest(".pp-mbtn");
            if (!btn || btn.disabled) return;

            const point = { y: Number(btn.dataset.y), m: Number(btn.dataset.m) };
            if (state.pickerStage === 0) {
              state.pickerStart = point;
              state.pickerEnd = null;
              state.pickerStage = 1;
            } else {
              if (monthAbs(point) < monthAbs(state.pickerStart)) {
                state.pickerEnd = state.pickerStart;
                state.pickerStart = point;
              } else {
                state.pickerEnd = point;
              }
              state.pickerStage = 0;
            }

            refreshPicker();
          });

          col.appendChild(head);
          col.appendChild(grid);
          container.appendChild(col);
        });

      refreshPicker();
    }

    function refreshPicker() {
      const start = state.pickerStart;
      const end = state.pickerEnd || state.pickerStart;

      document.querySelectorAll(".pp-mbtn").forEach(btn => {
        const point = { y: Number(btn.dataset.y), m: Number(btn.dataset.m) };
        btn.classList.remove("insel", "edge");

        if (!start || !end) return;

        const abs = monthAbs(point);
        const from = monthAbs(start);
        const to = monthAbs(end);

        if (abs >= from && abs <= to) btn.classList.add("insel");
        if (
          (point.y === start.y && point.m === start.m) ||
          (state.pickerEnd && point.y === state.pickerEnd.y && point.m === state.pickerEnd.m)
        ) {
          btn.classList.add("edge");
        }
      });

      $("ppHint").textContent = state.pickerStage === 1
        ? "Теперь выберите конец периода"
        : (state.pickerStart ? "Диапазон выбран — нажмите Применить" : "Выберите начало периода");
    }

    function resetPicker() {
      state.pickerStart = null;
      state.pickerEnd = null;
      state.pickerStage = 0;
      refreshPicker();
    }

    function applyPicker() {
      if (!state.pickerStart) {
        closePicker();
        return;
      }

      state.period = {
        kind: "custom",
        start: { ...state.pickerStart },
        end: { ...(state.pickerEnd || state.pickerStart) },
      };

      state.preset = "custom";
      document.querySelectorAll("[data-period]").forEach(btn => btn.classList.remove("active"));
      $("periodBtn").classList.add("active");
      $("periodBtnLabel").textContent = formatPeriodLabel(state.period);
      closePicker();
      updatePeriodUI();
      render();
    }

    function toggleTheme() {
      const isDark = !document.body.classList.contains("dark");
      document.body.classList.toggle("dark", isDark);
      $("themeBtn").textContent = isDark ? "☾" : "☀";

      try {
        localStorage.setItem("dashboard_theme", isDark ? "dark" : "light");
      } catch (error) {
        console.error(error);
      }
    }

    function restoreTheme() {
      try {
        const saved = localStorage.getItem("dashboard_theme");
        if (saved === "dark") {
          document.body.classList.add("dark");
          $("themeBtn").textContent = "☾";
        } else {
          document.body.classList.remove("dark");
          $("themeBtn").textContent = "☀";
        }
      } catch (error) {
        console.error(error);
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.().catch(() => {});
      } else {
        document.exitFullscreen?.().catch(() => {});
      }
    }

    function bindEvents() {
      document.querySelectorAll("[data-period]").forEach(btn => {
        btn.addEventListener("click", () => setPeriodPreset(btn.dataset.period));
      });

      document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.addEventListener("click", () => setMode(btn.dataset.mode));
      });

      $("periodBtn").addEventListener("click", event => {
        event.stopPropagation();
        if (state.pickerOpen) closePicker();
        else openPicker();
      });

      $("pickerResetBtn").addEventListener("click", resetPicker);
      $("pickerCancelBtn").addEventListener("click", closePicker);
      $("pickerApplyBtn").addEventListener("click", applyPicker);
      $("themeBtn").addEventListener("click", toggleTheme);
      $("refreshBtn").addEventListener("click", reload);
      $("fullscreenBtn").addEventListener("click", toggleFullscreen);

      document.addEventListener("mousedown", event => {
        if (!state.pickerOpen) return;

        const popup = $("periodPopup");
        const button = $("periodBtn");
        if (!popup.contains(event.target) && !button.contains(event.target)) {
          closePicker();
        }
      });
    }

    function boot() {
      restoreTheme();
      bindEvents();
      reload();
      state.autoTimer = setInterval(reload, AUTO_REFRESH_MS);
    }

    boot();
  </script>
</body>
</html>
